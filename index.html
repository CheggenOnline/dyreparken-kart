<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Dyreparken – familiekart</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dyreparken">
<meta name="theme-color" content="#2e7d32">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  html,body{margin:0;padding:0;height:100%;font-family:-apple-system,'Segoe UI',Roboto,sans-serif;}
  #map{position:absolute;top:0;bottom:0;left:0;right:0;}
  .topbar{position:absolute;top:calc(8px + env(safe-area-inset-top));left:8px;right:8px;z-index:1000;display:flex;gap:6px;flex-wrap:wrap;}
  .topbar button{border:none;border-radius:16px;padding:7px 12px;font-size:13px;font-weight:600;
    background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.3);cursor:pointer;color:#333;}
  .topbar button.active{background:#2e7d32;color:#fff;}
  .topbar button.warn{background:#ff9800;color:#fff;}
  #panel{position:absolute;bottom:0;left:0;right:0;z-index:1000;background:#fff;border-radius:16px 16px 0 0;
    box-shadow:0 -2px 10px rgba(0,0,0,.25);max-height:45%;display:flex;flex-direction:column;transition:max-height .25s;}
  #panel.collapsed{max-height:44px;}
  #panelHead{padding:10px 16px;font-weight:700;font-size:15px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
  #list{overflow-y:auto;padding:0 8px calc(12px + env(safe-area-inset-bottom));}
  .row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;}
  .row:active{background:#eef7ee;}
  .row .em{font-size:22px;width:28px;text-align:center;}
  .row .nm{flex:1;font-size:14px;font-weight:600;color:#222;}
  .row .nm small{display:block;font-weight:400;color:#777;font-size:11px;}
  .row .min{font-size:14px;font-weight:800;color:#2e7d32;white-space:nowrap;}
  .divlabel{padding:6px 12px 2px;font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.5px;}
  .emoji-marker{font-size:22px;text-shadow:0 1px 3px rgba(0,0,0,.4);text-align:center;line-height:26px;}
  .emoji-small{font-size:15px;opacity:.85;text-align:center;line-height:18px;}
  .me-dot{width:18px;height:18px;border-radius:50%;background:#1976d2;border:3px solid #fff;box-shadow:0 0 8px rgba(25,118,210,.9);position:absolute;left:16px;top:16px;}
  .me-wrap{position:relative;width:56px;height:56px;transform-origin:28px 28px;transition:transform .2s linear;}
  .me-wrap svg{position:absolute;left:0;top:0;display:none;}
  .leaflet-popup-content{font-size:14px;margin:10px 14px;}
  .leaflet-popup-content b{font-size:15px;}
  #hint{position:fixed;top:calc(52px + env(safe-area-inset-top));left:8px;right:8px;z-index:1300;background:#fff8e1;border:1px solid #ffca28;
    border-radius:10px;padding:8px 12px;font-size:13px;display:none;box-shadow:0 2px 8px rgba(0,0,0,.25);}
  #hint.alert{background:#ffebee;border:2px solid #e53935;font-size:16px;font-weight:700;padding:14px;}
</style>
</head>
<body>
<div id="map"></div>
<div class="topbar">
  <button onclick="toggleProgram()">🎭 Program</button>
  <button onclick="toggleSettings()">⚙️ Innstillinger</button>
  <button id="btnClearRoute" style="display:none;background:#e91e63;color:#fff;" onclick="clearRoute()">✕ Fjern rute</button>
</div>
<div id="settings" style="display:none;position:fixed;top:0;bottom:0;left:0;right:0;z-index:1100;background:#fff;overflow-y:auto;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px 6px;">
    <b style="font-size:17px;">⚙️ Innstillinger</b>
    <button onclick="toggleSettings()" style="border:none;background:#eee;border-radius:14px;padding:6px 12px;font-weight:700;cursor:pointer;">✕ Lukk</button>
  </div>
  <div style="padding:6px 16px 4px;font-size:12px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.5px;">Vis på kartet og i listen</div>
  <label style="display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:15px;font-weight:600;"><input type="checkbox" checked onchange="setCat('univers',this.checked)" style="width:20px;height:20px;"> 🎪 Universer og attraksjoner</label>
  <label style="display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:15px;font-weight:600;"><input type="checkbox" checked onchange="setCat('dyr',this.checked)" style="width:20px;height:20px;"> 🦁 Dyr</label>
  <label style="display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:15px;font-weight:600;"><input type="checkbox" checked onchange="setCat('leke',this.checked)" style="width:20px;height:20px;"> 🛝 Lekeplasser</label>
  <label style="display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:15px;font-weight:600;"><input type="checkbox" checked onchange="setCat('wc',this.checked)" style="width:20px;height:20px;"> 🚻 Toaletter</label>
  <label style="display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:15px;font-weight:600;"><input type="checkbox" checked onchange="setCat('forstehjelp',this.checked)" style="width:20px;height:20px;"> 🩹 Førstehjelp</label>
  <label style="display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:15px;font-weight:600;"><input type="checkbox" checked onchange="setCat('skap',this.checked)" style="width:20px;height:20px;"> 🔐 Oppbevaringsskap</label>
  <label style="display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:15px;font-weight:600;"><input type="checkbox" checked onchange="setCat('vogn',this.checked)" style="width:20px;height:20px;"> 🛒 Utleie trillevogn/rullestol</label>
  <label style="display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:15px;font-weight:600;"><input type="checkbox" checked onchange="setCat('service',this.checked)" style="width:20px;height:20px;"> ℹ️ Gjesteservice og minibank</label>
  <div style="padding:16px 16px 4px;font-size:12px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.5px;">Ganghastighet</div>
  <div style="padding:6px 16px 20px;">
    <select onchange="setSpeed(this.value)" style="width:100%;font-size:16px;padding:10px 12px;border:1px solid #ddd;border-radius:12px;background:#fff;">
      <option value="3">🐢 3-åringer (rolig)</option>
      <option value="5" selected>🚶 5-åringer</option>
      <option value="10">🏃 10-åringer</option>
      <option value="voksen">💨 Voksen</option>
    </select>
    <div style="font-size:12px;color:#888;padding-top:8px;">Gangtidene i listen, popupene og rutene justeres etter valget.</div>
  </div>
</div>
<button id="btnCenter" onclick="centerMe()" title="Sentrer på meg"
  style="position:absolute;top:calc(8px + env(safe-area-inset-top));right:8px;z-index:1001;width:42px;height:42px;border:none;border-radius:50%;background:#1976d2;color:#fff;font-size:19px;line-height:42px;padding:0;box-shadow:0 2px 6px rgba(0,0,0,.35);cursor:pointer;"><span style="display:inline-block;transform:rotate(-45deg);">➤</span></button>
<div id="prog" style="display:none;position:fixed;top:0;bottom:0;left:0;right:0;z-index:1100;background:#fff;overflow-y:auto;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px 6px;">
    <b style="font-size:17px;">🎭 Dagens program</b>
    <button onclick="document.getElementById('prog').style.display='none'" style="border:none;background:#eee;border-radius:14px;padding:6px 12px;font-weight:700;cursor:pointer;">✕ Lukk</button>
  </div>
  <div id="progList"><div style="padding:14px;color:#777;">Laster …</div></div>
</div>
<div id="hint"></div>
<div id="panel" class="collapsed">
  <div id="panelHead" onclick="document.getElementById('panel').classList.toggle('collapsed')">
    <span id="tempoLbl">🚶 Gangtid herfra (5-åringstempo)</span><span id="panelArrow">▲</span>
  </div>
  <div style="padding:0 12px 8px;"><input id="search" type="search" placeholder="🔎 Søk attraksjon …" oninput="renderList()" onclick="event.stopPropagation()" style="width:100%;box-sizing:border-box;border:1px solid #ddd;border-radius:12px;padding:8px 12px;font-size:15px;"></div>
  <div id="list"><div style="padding:12px;color:#777;font-size:13px;">Venter på GPS-posisjon …</div></div>
</div>
<script>
// ---- Attraksjoner (ekte koordinater fra OpenStreetMap) ----
const P = [
 // Universer & hovedattraksjoner
 {n:"Hovedinngang",           la:58.18454, lo:8.14674, c:"univers", e:"🎟️", d:"Inngang øst / hovedinngang"},
 {n:"Inngang Syd",            la:58.18175, lo:8.14600, c:"univers", e:"🎟️", d:"Sørlig inngang"},
 {n:"Kardemomme by",          la:58.18734, lo:8.13997, c:"univers", e:"🏘️", d:"Politimester Bastian & Kamomilla. Perfekt for 4-åringer"},
 {n:"Kardemomme-karusellen",  la:58.18737, lo:8.13931, c:"univers", e:"🎠", d:"Karusell i Kardemomme by"},
 {n:"Hakkebakkeskogen (togreise)", la:58.18589, lo:8.14061, c:"univers", e:"🚂", d:"Reisen gjennom Hakkebakkeskogen – stor favoritt"},
 {n:"KuToppen",               la:58.18464, lo:8.14022, c:"univers", e:"🐄", d:"Bondegård med aktivitetshus – klappe dyr"},
 {n:"Kaptein Sabeltanns verden (Kjuttaviga)", la:58.18585, lo:8.14721, c:"univers", e:"🏴‍☠️", d:"Sjørøverteater, skattkammer, båter"},
 {n:"Abra Havn",              la:58.18835, lo:8.15130, c:"univers", e:"⚓", d:"Sjørøverlandsby med paradegate"},
 {n:"Badelandet",             la:58.18805, lo:8.14469, c:"univers", e:"🏊", d:"Innendørs badeland (egen billett)"},
 {n:"Minitoget",              la:58.18647, lo:8.14585, c:"univers", e:"🚃", d:"Lite tog – fin pause for små bein"},
 {n:"JungelBob (berg-og-dalbane)", la:58.18511, lo:8.14304, c:"univers", e:"🎢", d:"Barnevennlig berg-og-dalbane"},
 {n:"Tømmerrenna Nilen",          la:58.18362, lo:8.14555, c:"univers", e:"🛶", d:"Vannrenna i Afrika – regn med å bli våt!"},
 // Dyr
 {n:"Nordisk Villmark",       la:58.18638, lo:8.13680, c:"dyr", e:"🐺", d:"Ulv, elg, gaupe, jerv – gangsti gjennom skogen"},
 {n:"Elgen",                  la:58.18670, lo:8.13476, c:"dyr", e:"🫎", d:"I Nordisk Villmark"},
 {n:"Savannen",               la:58.18325, lo:8.14716, c:"dyr", e:"🦒", d:"Sjiraff, sebra, antiloper"},
 {n:"Løvene",                 la:58.18252, lo:8.14568, c:"dyr", e:"🦁", d:"Løveanlegget"},
 {n:"Tigerens rike",          la:58.18239, lo:8.14013, c:"dyr", e:"🐯", d:"Sibirsk tiger"},
 {n:"Orangutanghuset",        la:58.18166, lo:8.14088, c:"dyr", e:"🦧", d:"Orangutanger"},
 {n:"Sjimpansene",            la:58.18386, lo:8.14358, c:"dyr", e:"🐵", d:"Sjimpanseøya"},
 {n:"Ringhalelemurene",       la:58.18358, lo:8.14196, c:"dyr", e:"🐒", d:"Lemurer"},
 {n:"Manyatta – Barnas afrikanske landsby", la:58.18301, lo:8.14512, c:"dyr", e:"🐐", d:"Klappedyr – topp for 4-åringer"},
 {n:"Surikatene",             la:58.18244, lo:8.14678, c:"dyr", e:"🦫", d:"Surikater og ørkenrev"},
 {n:"Kamelene",               la:58.18807, lo:8.14000, c:"dyr", e:"🐫", d:"Ved Kardemomme by"},
 // Lekeplasser
 {n:"Klatrefjellet",          la:58.18337, lo:8.14419, c:"leke", e:"🛝", d:"Lekeplass midt i parken"},
 {n:"Dødningskallen",         la:58.18880, lo:8.14982, c:"leke", e:"💀", d:"Sjørøverlekeplass ved Abra Havn"},
 {n:"Ildprøveplassen",        la:58.18921, lo:8.15110, c:"leke", e:"🔥", d:"Lekeplass i Abra Havn"},
 // WC
 {n:"WC", la:58.18181, lo:8.14629, c:"wc", e:"🚻"}, {n:"WC", la:58.18229, lo:8.14021, c:"wc", e:"🚻"},
 {n:"WC", la:58.18288, lo:8.14371, c:"wc", e:"🚻"}, {n:"WC", la:58.18327, lo:8.14618, c:"wc", e:"🚻"},
 {n:"WC", la:58.18557, lo:8.14716, c:"wc", e:"🚻"}, {n:"WC", la:58.18570, lo:8.14332, c:"wc", e:"🚻"},
 {n:"WC", la:58.18628, lo:8.14502, c:"wc", e:"🚻"}, {n:"WC", la:58.18727, lo:8.13897, c:"wc", e:"🚻"},
 {n:"WC", la:58.18785, lo:8.14447, c:"wc", e:"🚻"}, {n:"WC", la:58.18403, lo:8.13943, c:"wc", e:"🚻"},
 {n:"WC (Abra Havn)", la:58.18836, lo:8.15144, c:"wc", e:"🚻"},
 // Service og hjelp
 {n:"Gjesteservice",              la:58.18446, lo:8.14705, c:"service", e:"ℹ️", d:"Billetter, Vis hensyn-bånd, utleie og hjelp – ved hovedinngangen"},
 {n:"Førstehjelp",                la:58.18450, lo:8.14655, c:"forstehjelp", e:"🩹", d:"Kontakt Gjesteservice ved hovedinngangen eller nærmeste ansatt"},
 {n:"Oppbevaringsskap",           la:58.18462, lo:8.14690, c:"skap", e:"🔐", d:"Ved hovedinngangen"},
 {n:"Utleie trillevogn/rullestol", la:58.18440, lo:8.14670, c:"vogn", e:"🛒", d:"Gjesteservice ved hovedinngangen – vogner og rullestoler (depositum, kan reserveres)"},
 {n:"Minibank",                   la:58.18560, lo:8.14397, c:"service", e:"🏧", d:"Ved Båtbasaren"},
];

const SPEEDS={ '3':33, '5':42, '10':58, 'voksen':80 }; // meter per minutt
let SPEED_M_PER_MIN = SPEEDS['5'];
const PATH_FACTOR = 1.35;     // stier er ikke luftlinje
const cats={univers:true,dyr:true,leke:true,wc:true,forstehjelp:true,skap:true,vogn:true,service:true};

function toggleSettings(){
  const el=document.getElementById('settings');
  el.style.display=el.style.display==='block'?'none':'block';
}
function setCat(cat,on){cats[cat]=on;redraw();}
function setSpeed(v){
  SPEED_M_PER_MIN=SPEEDS[v];
  const lbl={'3':'3-åringstempo','5':'5-åringstempo','10':'10-åringstempo','voksen':'voksentempo'}[v];
  document.getElementById('tempoLbl').textContent='🚶 Gangtid herfra ('+lbl+')';
  redraw();
}

const map = L.map('map',{zoomControl:false}).setView([58.1855,8.1435],16);
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,
  attribution:'&copy; OpenStreetMap'}).addTo(map);

let me=null, meMarker=null, accCircle=null, watchId=null, hasCompass=false;
const markers=[];

function icon(e,small){return L.divIcon({html:e,className:small?'emoji-small':'emoji-marker',iconSize:small?[18,18]:[26,26],iconAnchor:small?[9,9]:[13,13]});}

P.forEach(p=>{
  const m=L.marker([p.la,p.lo],{icon:icon(p.e,p.c==='wc')});
  m.bindPopup('…'); m.p=p; markers.push(m);
});

function dist(a,b,c,d){const R=6371000,r=Math.PI/180;
  const x=(c-a)*r, y=(d-b)*r*Math.cos((a+c)/2*r);
  return R*Math.sqrt(x*x+y*y);}
function mins(p){if(!me)return null;
  return Math.max(1,Math.round(dist(me[0],me[1],p.la,p.lo)*PATH_FACTOR/SPEED_M_PER_MIN));}

function popupHtml(p){
  const t=mins(p);
  const idx=P.indexOf(p);
  return `<b>${p.e} ${p.n}</b><br>${p.d||''}${t?`<br><span style="color:#2e7d32;font-weight:800;">🚶 ca. ${t} min å gå</span>`:'<br><i>Sett posisjonen din for gangtid</i>'}<br><button style="margin-top:6px;border:none;border-radius:12px;padding:6px 12px;background:#e91e63;color:#fff;font-weight:700;font-size:13px;cursor:pointer;" onclick="route(${idx})">🧭 Vis raskeste vei</button>`;}

function redraw(){
  markers.forEach(m=>{
    if(cats[m.p.c]){m.addTo(map);m.setPopupContent(popupHtml(m.p));}
    else map.removeLayer(m);
  });
  renderList();
}

function timeToMin(hm){return (+hm.slice(0,2))*60+(+hm.slice(3,5));}
function nextShowFor(p){
  if(!progData||!progData.entries)return null;
  if(progData.date!==new Date().toLocaleDateString('sv-SE'))return null;
  const nowM=timeToMin(new Date().toTimeString().slice(0,5));
  let best=null;
  for(const e of progData.entries){
    const c=venueCoords(e); if(!c)continue;
    if(dist(c[0],c[1],p.la,p.lo)>60)continue;
    for(const t of e.times){
      const m=timeToMin(t.from)-nowM;
      if(m>=0&&(!best||m<best.min))best={min:m,title:e.title,from:t.from};
    }
  }
  return best;
}

function renderList(){
  const el=document.getElementById('list');
  if(!me){return;}
  const q=(document.getElementById('search')?.value||'').trim().toLowerCase();
  const match=p=>!q||p.n.toLowerCase().includes(q)||(p.d||'').toLowerCase().includes(q);
  const items=P.filter(p=>p.c!=='wc'&&cats[p.c]&&match(p)).map(p=>({p,t:mins(p)})).sort((a,b)=>a.t-b.t);
  const wc=cats.wc?P.filter(p=>p.c==='wc').map(p=>({p,t:mins(p)})).sort((a,b)=>a.t-b.t)[0]:null;
  let h='';
  if(wc&&!q) h+=`<div class="row" onclick="fly(${wc.p.la},${wc.p.lo})"><div class="em">🚻</div><div class="nm">Nærmeste toalett</div><div class="min">${wc.t} min</div></div><div class="divlabel">Attraksjoner – nærmest først</div>`;
  if(!items.length) h+='<div style="padding:12px;color:#777;font-size:13px;">Ingen treff.</div>';
  h+=items.map(i=>{
    const ns=nextShowFor(i.p);
    const show=ns?`<small style="color:#e91e63;font-weight:600;">🎭 ${ns.title.length>40?ns.title.slice(0,38)+'…':ns.title} kl. ${ns.from}${ns.min>0?` (om ${ns.min} min)`:' (nå)'}</small>`:'';
    return `<div class="row" onclick="fly(${i.p.la},${i.p.lo})"><div class="em">${i.p.e}</div><div class="nm">${i.p.n}<small>${i.p.d||''}</small>${show}</div><div class="min">${i.t} min</div></div>`;
  }).join('');
  el.innerHTML=h;
}
function fly(la,lo){map.flyTo([la,lo],17.5);const m=markers.find(m=>m.p.la===la&&m.p.lo===lo);if(m)m.openPopup();}

function setMe(la,lo,acc){
  const first=!meMarker;
  me=[la,lo];
  if(!meMarker){
    const html='<div class="me-wrap" id="meWrap"><svg width="56" height="56" viewBox="0 0 56 56"><path d="M28 28 L12 3 A30 30 0 0 1 44 3 Z" fill="#1976d2" fill-opacity="0.6" stroke="#fff" stroke-width="1.5"/></svg><div class="me-dot"></div></div>';
    meMarker=L.marker(me,{icon:L.divIcon({html:html,className:'',iconSize:[56,56],iconAnchor:[28,28]}),zIndexOffset:1000}).addTo(map).bindPopup('<b>Du er her</b>');
    meMarker.on('click',()=>{map.flyTo(me,Math.max(map.getZoom(),17));});
    accCircle=L.circle(me,{radius:acc||20,color:'#1976d2',weight:1,fillOpacity:.08}).addTo(map);
  } else {meMarker.setLatLng(me);accCircle.setLatLng(me);if(acc)accCircle.setRadius(acc);}
  if(first){map.flyTo(me,17);document.getElementById('panel').classList.remove('collapsed');}
  redraw();
  if(typeof notifyCheck==='function')notifyCheck();
}

// ---- Rute (raskeste vei langs stiene, OSRM foot) ----
let routeLine=null;
function clearRoute(){
  if(routeLine){map.removeLayer(routeLine);routeLine=null;}
  document.getElementById('btnClearRoute').style.display='none';
}
async function route(idx){const p=P[idx];return routeTo(p.la,p.lo,p.n);}
async function routeTo(la,lo,name){
  if(!me){hint('Sett posisjonen din først – trykk «📍 Finn meg» eller «👆 Sett posisjon».',6000);return;}
  hint('Finner raskeste vei …',3000);
  map.closePopup();
  try{
    const r=await fetch(`https://routing.openstreetmap.de/routed-foot/route/v1/foot/${me[1]},${me[0]};${lo},${la}?overview=full&geometries=geojson`);
    const j=await r.json();
    if(j.code!=='Ok'||!j.routes||!j.routes[0])throw new Error('no route');
    const coords=j.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
    if(routeLine)map.removeLayer(routeLine);
    routeLine=L.polyline(coords,{color:'#e91e63',weight:5,opacity:.9}).addTo(map);
    const d=j.routes[0].distance;
    const t=Math.max(1,Math.round(d/SPEED_M_PER_MIN));
    map.fitBounds(routeLine.getBounds(),{padding:[70,70]});
    hint(`🧭 Til ${name}: ca. ${t} min å gå (${Math.round(d)} m) i valgt tempo`,10000);
  }catch(e){
    if(routeLine)map.removeLayer(routeLine);
    routeLine=L.polyline([me,[la,lo]],{color:'#e91e63',weight:4,dashArray:'6 8',opacity:.8}).addTo(map);
    map.fitBounds(routeLine.getBounds(),{padding:[70,70]});
    const est=Math.max(1,Math.round(dist(me[0],me[1],la,lo)*PATH_FACTOR/SPEED_M_PER_MIN));
    hint(`Fant ikke sti-rute akkurat nå – viser retningen (luftlinje) til ${name}. Ca. ${est} min.`,8000);
  }
  document.getElementById('btnClearRoute').style.display='inline-block';
}

// ---- Dagens program (oppdateres automatisk fra dyreparken.no via GitHub Action) ----
let progData=null, progLoaded=false;
const VENUES={'KuToppen':[58.18464,8.14022],'Kaptein Sabeltanns Verden':[58.18585,8.14721],'Hakkebakkeskogen':[58.18589,8.14061],'Kardemomme by':[58.18734,8.13997],'Nordisk Villmark':[58.18638,8.13680],'Afrika':[58.18325,8.14716],'Jungelen':[58.18511,8.14304],'Abra Havn':[58.18835,8.15130],'Badelandet':[58.18805,8.14469]};
function venueCoords(e){
  if(VENUES[e.venue])return VENUES[e.venue];
  const t=(e.title||'').toLowerCase();
  for(const k of Object.keys(VENUES)){if(t.includes(k.toLowerCase()))return VENUES[k];}
  if(/sabeltann|sjørøver|pinky|langemann/.test(t))return VENUES['Kaptein Sabeltanns Verden'];
  if(/kardemomme|tobias|bastian|kamomilla|trikke/.test(t))return VENUES['Kardemomme by'];
  if(/hakkebakke|klatremus|bakermester|morten skogmus/.test(t))return VENUES['Hakkebakkeskogen'];
  if(/kutoppen|klara|gårds/.test(t))return VENUES['KuToppen'];
  if(/savanne|sjiraff|afrika/.test(t))return VENUES['Afrika'];
  return null;
}
let progFetchedAt=0;
function normalizeProgram(){
  if(!progData)return;
  const today=new Date().toLocaleDateString('sv-SE');
  // Har datoen rullet over? Da er «i morgen» i dataene blitt «i dag».
  if(progData.date!==today&&progData.tomorrow&&progData.tomorrow.date===today){
    progData={date:progData.tomorrow.date,updated:progData.updated,entries:progData.tomorrow.entries,hours:progData.tomorrow.hours||null,tomorrow:null};
  }
}
function cleanMyProg(){
  const today=new Date().toLocaleDateString('sv-SE');
  const nowHM=new Date().toTimeString().slice(0,5);
  const before=myProg.length;
  myProg=myProg.filter(m=>m.date>today||(m.date===today&&m.to>=nowHM));
  if(myProg.length!==before)saveMyProg();
}
async function refreshProgram(force){
  const today=new Date().toLocaleDateString('sv-SE');
  const stale=!progData||(progData.date!==today&&!(progData.tomorrow&&progData.tomorrow.date===today))||Date.now()-progFetchedAt>30*60000;
  if(force||stale){
    try{const r=await fetch('program.json?t='+Date.now(),{cache:'no-store'});progData=await r.json();progFetchedAt=Date.now();}catch(e){}
  }
  normalizeProgram();
  cleanMyProg();
  renderList();
  if(document.getElementById('prog').style.display==='block')renderProgram();
}
async function ensureProgram(){
  if(!progLoaded){await refreshProgram(true);progLoaded=true;}
  else{await refreshProgram(false);}
}
async function toggleProgram(){
  const el=document.getElementById('prog');
  if(el.style.display==='block'){el.style.display='none';return;}
  el.style.display='block';
  await ensureProgram();
  renderProgram();
}
// ---- Mitt program ----
let myProg=[]; try{myProg=JSON.parse(localStorage.getItem('myprog')||'[]');}catch(e){}
let notifyOn=false; try{notifyOn=localStorage.getItem('notifyOn')==='1';}catch(e){}
let PROG_FLAT=[];
function saveMyProg(){try{localStorage.setItem('myprog',JSON.stringify(myProg));}catch(e){}}
function progIdOf(d,title,from){return d+'|'+title+'|'+from;}
function walkMinBetween(a,b,c,d){return Math.max(1,Math.round(dist(a,b,c,d)*PATH_FACTOR/SPEED_M_PER_MIN));}
function addItem(e,t,dateISO){
  const id=progIdOf(dateISO,e.title,t.from);
  if(myProg.some(x=>x.id===id)){myProg=myProg.filter(x=>x.id!==id);}
  else{const c=venueCoords(e);myProg.push({id,title:e.title,venue:e.venue,from:t.from,to:t.to,date:dateISO,la:c?c[0]:null,lo:c?c[1]:null,notified:false});}
  saveMyProg();renderProgram();
}
function removeMine(id){myProg=myProg.filter(x=>x.id!==id);saveMyProg();renderProgram();}
function plusRow(i){
  const e=PROG_FLAT[i];
  if(e._shown.length===1){addItem(e,e._shown[0],e._date);return;}
  const p=document.getElementById('pick'+i);
  if(p.style.display==='block'){p.style.display='none';return;}
  p.innerHTML='<span style="font-size:12px;color:#888;margin-right:6px;">Velg tidspunkt:</span>'+e._shown.map((t,j)=>{
    const added=myProg.some(x=>x.id===progIdOf(e._date,e.title,t.from));
    return `<button onclick="event.stopPropagation();pickTime(${i},${j})" style="border:none;border-radius:10px;padding:6px 10px;margin:2px;font-weight:700;cursor:pointer;background:${added?'#2e7d32':'#eee'};color:${added?'#fff':'#333'};">${t.from}${added?' ✓':''}</button>`;
  }).join('');
  p.style.display='block';
}
function pickTime(i,j){const e=PROG_FLAT[i];addItem(e,e._shown[j],e._date);}
function conflictsFor(sorted){
  const bad={};
  for(let i=1;i<sorted.length;i++){
    const p=sorted[i-1],n=sorted[i];
    if(p.date!==n.date||p.la==null||n.la==null)continue;
    const w=walkMinBetween(p.la,p.lo,n.la,n.lo);
    if(timeToMin(n.from)<timeToMin(p.to)+w)
      bad[n.id]='⚠️ Rekkes neppe: '+w+' min å gå fra «'+p.title.slice(0,26)+'» som varer til '+p.to;
  }
  return bad;
}
function setNotify(on){
  notifyOn=on; try{localStorage.setItem('notifyOn',on?'1':'0');}catch(e){}
  if(on&&('Notification' in window)&&Notification.permission==='default'){try{Notification.requestPermission();}catch(e){}}
  if(on)hint('🔔 Varsling på – hold appen åpen, så sier jeg fra når dere må gå.',6000);
}
function notifyCheck(){
  if(!notifyOn||!me)return;
  const today=new Date().toLocaleDateString('sv-SE');
  const nowMin=timeToMin(new Date().toTimeString().slice(0,5));
  let changed=false;
  for(const m of myProg){
    if(m.date!==today||m.la==null||m.notified)continue;
    const start=timeToMin(m.from);
    if(start<nowMin){m.notified=true;changed=true;continue;}
    const w=walkMinBetween(me[0],me[1],m.la,m.lo);
    if(nowMin>=start-w-1){
      m.notified=true;changed=true;
      fireNotify('Gå nå! «'+m.title+'» begynner kl. '+m.from+' – ca. '+w+' min å gå dit.');
    }
  }
  if(changed)saveMyProg();
}
function fireNotify(msg){
  if(('Notification' in window)&&Notification.permission==='granted'){try{new Notification('🎭 Dyreparken',{body:msg,icon:'icon-192.png'});}catch(e){}}
  alertHint('🔔 '+msg);
  if(navigator.vibrate)navigator.vibrate([300,150,300]);
}
function testNotify(){
  if(('Notification' in window)&&Notification.permission==='default'){try{Notification.requestPermission();}catch(e){}}
  fireNotify('Test: Slik ser «gå nå»-varselet ut. Hold appen åpen, så kommer det automatisk.');
}
setInterval(notifyCheck,20000);
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')notifyCheck();});
function renderMyProg(){
  if(!myProg.length)return '<div style="padding:8px 16px 0;font-size:13px;color:#888;">Trykk ＋ på programpostene under for å bygge «Mitt program» for i dag og i morgen.</div>';
  const sorted=[...myProg].sort((a,b)=>(a.date+a.from).localeCompare(b.date+b.from));
  const bad=conflictsFor(sorted);
  const today=new Date().toLocaleDateString('sv-SE');
  let h='<div class="divlabel" style="font-size:13px;">⭐ Mitt program</div>';
  h+=sorted.map(m=>`<div class="row" style="background:#fff8e1;border-radius:10px;margin:2px 8px;">
    <div class="em">${m.date===today?'⭐':'🗓️'}</div>
    <div class="nm">${m.title}<small>${m.date===today?'I dag':'I morgen'} kl. ${m.from}–${m.to} · ${m.venue||''}</small>${bad[m.id]?`<small style="color:#c62828;font-weight:700;">${bad[m.id]}</small>`:''}</div>
    ${m.la!=null?`<button style="border:none;background:#e91e63;color:#fff;border-radius:12px;padding:6px 10px;font-weight:700;cursor:pointer;" data-la="${m.la}" data-lo="${m.lo}" onclick="event.stopPropagation();progGo(+this.dataset.la,+this.dataset.lo,true)">🧭</button>`:''}
    <button style="border:none;background:#eee;color:#555;border-radius:12px;padding:6px 10px;font-weight:700;cursor:pointer;" data-id="${m.id.replace(/"/g,'&quot;')}" onclick="event.stopPropagation();removeMine(this.dataset.id)">✕</button>
  </div>`).join('');
  h+=`<label style="display:flex;align-items:center;gap:8px;padding:8px 16px 4px;font-size:13px;color:#555;"><input type="checkbox" ${notifyOn?'checked':''} onchange="setNotify(this.checked)" style="width:18px;height:18px;"> 🔔 Varsle meg når jeg må gå for å rekke neste post (appen må være åpen)</label>`;
  h+=`<div style="padding:0 16px 8px;"><button onclick="testNotify()" style="border:none;background:#eee;color:#333;border-radius:12px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer;">🔔 Test varsling</button></div>`;
  return h;
}
function dayLabel(iso){
  try{return new Date(iso+'T12:00:00').toLocaleDateString('nb-NO',{weekday:'long',day:'numeric',month:'long'});}catch(e){return iso;}
}
function renderDayEntries(entriesRaw,dateISO,isToday,nowHM){
  const seen=new Set();
  const uniq=entriesRaw.filter(e=>{const k=e.title+'|'+e.venue+'|'+e.times.map(t=>t.from).join(',');if(seen.has(k))return false;seen.add(k);return true;});
  let list=uniq.map(e=>({...e,next:isToday?(e.times.find(t=>t.to>=nowHM)||null):(e.times[0]||null)}));
  if(isToday)list=list.filter(e=>e.next);
  list.sort((a,b)=>{const ka=a.next.from,kb=b.next.from;return ka<kb?-1:ka>kb?1:0;});
  if(!list.length)return '<div style="padding:10px 16px;font-size:14px;color:#555;">Ingen flere programposter i dag.</div>';
  return list.map(e=>{
    e._date=dateISO;
    e._shown=isToday?e.times.filter(t=>t.to>=nowHM):e.times;
    PROG_FLAT.push(e);
    const i=PROG_FLAT.length-1;
    const c=venueCoords(e);
    const anyAdded=e._shown.some(t=>myProg.some(x=>x.id===progIdOf(dateISO,e.title,t.from)));
    const times=e._shown.map(t=>`<span style="${isToday&&t.from===e.next.from?'font-weight:800;color:#2e7d32;':'color:#999;'}">${t.from}</span>`).join(' · ');
    const em=e.category==='Dyrepresentasjoner'?'🦁':e.category==='Kveldsforestillinger'?'🌟':'🎭';
    return `<div class="row" ${c?`onclick="progGo(${c[0]},${c[1]},false)"`:''}>
      <div class="em">${em}</div>
      <div class="nm">${e.title}${e.ticket?' 🎟️':''}<small>${e.venue||''} · ${times}${e.ticket?' · egen billett':''}</small></div>
      <button style="border:none;background:${anyAdded?'#2e7d32':'#eee'};color:${anyAdded?'#fff':'#333'};border-radius:12px;width:34px;height:34px;font-size:19px;font-weight:800;cursor:pointer;flex:none;" onclick="event.stopPropagation();plusRow(${i})">＋</button>
      ${c?`<button style="border:none;background:#e91e63;color:#fff;border-radius:12px;padding:6px 10px;font-weight:700;cursor:pointer;" onclick="event.stopPropagation();progGo(${c[0]},${c[1]},true)">🧭</button>`:''}
    </div><div id="pick${i}" style="display:none;padding:2px 12px 8px 50px;"></div>`;
  }).join('');
}
function renderProgram(){
  const el=document.getElementById('progList');
  const today=new Date().toLocaleDateString('sv-SE');
  if(!progData||!progData.entries||!progData.entries.length){
    el.innerHTML='<div style="padding:14px;font-size:14px;color:#555;">Programmet er ikke lastet ennå. Se <a href="https://www.dyreparken.no/dagsprogram/" target="_blank">dagsprogrammet på dyreparken.no</a>.</div>';
    return;
  }
  PROG_FLAT=[];
  const nowHM=new Date().toTimeString().slice(0,5);
  let h=renderMyProg();
  if(progData.date!==today)h+=`<div style="margin:8px 14px;padding:8px 12px;background:#fff8e1;border:1px solid #ffca28;border-radius:10px;font-size:13px;">⚠️ Programmet er fra ${progData.date} og kan avvike i dag. <a href="https://www.dyreparken.no/dagsprogram/" target="_blank">Sjekk dyreparken.no</a></div>`;
  const hoursLine=hh=>hh?`<div style="padding:2px 16px 6px;font-size:13px;font-weight:700;color:#2e7d32;">🕘 Dyreparken ${hh.dyreparken||'–'}${hh.badelandet?' · Badelandet '+hh.badelandet:''}</div>`:'';
  h+=`<div class="divlabel" style="font-size:13px;padding-top:12px;">📅 I dag – ${dayLabel(progData.date)}</div>`;
  h+=hoursLine(progData.hours);
  h+=renderDayEntries(progData.entries,progData.date,progData.date===today,nowHM);
  if(progData.tomorrow&&progData.tomorrow.entries&&progData.tomorrow.entries.length){
    h+=`<div class="divlabel" style="font-size:13px;padding-top:16px;margin-top:10px;border-top:3px solid #e0e0e0;">📅 I morgen – ${dayLabel(progData.tomorrow.date)}</div>`;
    h+=hoursLine(progData.tomorrow.hours);
    h+=renderDayEntries(progData.tomorrow.entries,progData.tomorrow.date,false,nowHM);
  }
  h+=`<div style="padding:10px 14px 24px;font-size:12px;color:#888;">Hentes automatisk fra dyreparken.no hver morgen · <a href="https://www.dyreparken.no/dagsprogram/" target="_blank">offisielt dagsprogram</a></div>`;
  el.innerHTML=h;
}
function progGo(la,lo,withRoute){
  document.getElementById('prog').style.display='none';
  // finn attraksjonsmarkøren på samme sted, så vi kan vise samme popup som i listen
  let best=null,bd=1e9;
  for(const m of markers){const d=dist(m.p.la,m.p.lo,la,lo);if(d<bd){bd=d;best=m;}}
  const hit=best&&bd<80?best:null;
  if(withRoute){routeTo(la,lo,hit?hit.p.n:'forestillingen');return;}
  if(hit)fly(hit.p.la,hit.p.lo); // åpner popupen med gangtid + «Vis raskeste vei»
  else map.flyTo([la,lo],17.5);
}

function hint(t,ms){const h=document.getElementById('hint');h.classList.remove('alert');h.textContent=t;h.style.display='block';if(ms)setTimeout(()=>h.style.display='none',ms);}
function alertHint(t,ms){const h=document.getElementById('hint');h.classList.add('alert');h.textContent=t;h.style.display='block';setTimeout(()=>{h.style.display='none';h.classList.remove('alert');},ms||25000);}

function centerMe(){
  if(me){map.flyTo(me,Math.max(map.getZoom(),17));}
  else{hint('Venter fortsatt på GPS-posisjon …',4000);startGps();}
}
function startGps(){
  if(!navigator.geolocation){hint('GPS er ikke tilgjengelig i denne nettleseren.');return;}
  hint('Henter GPS-posisjon …',4000);
  if(watchId)navigator.geolocation.clearWatch(watchId);
  watchId=navigator.geolocation.watchPosition(
    pos=>{setMe(pos.coords.latitude,pos.coords.longitude,pos.coords.accuracy);
          if(!hasCompass&&pos.coords.heading!=null&&!isNaN(pos.coords.heading)&&(pos.coords.speed||0)>0.5)applyHeading(pos.coords.heading);},
    err=>{hint('Fikk ikke GPS-posisjon. Sjekk at nettleseren har lov til å bruke stedstjenester (Innstillinger → Safari/Chrome → Posisjon), og last siden på nytt.');},
    {enableHighAccuracy:true,maximumAge:5000,timeout:15000});
}

// ---- Kompass / retning ----
function applyHeading(h){
  const w=document.getElementById('meWrap');
  if(!w)return;
  w.style.transform='rotate('+h+'deg)';
  w.querySelector('svg').style.display='block';
}
function headingHandler(e){
  let h=null;
  if(typeof e.webkitCompassHeading==='number'&&!isNaN(e.webkitCompassHeading))h=e.webkitCompassHeading;
  else if(e.absolute&&typeof e.alpha==='number')h=(360-e.alpha)%360;
  if(h!=null){hasCompass=true;applyHeading(h);}
}
function initHeading(){
  if(window.DeviceOrientationEvent&&typeof DeviceOrientationEvent.requestPermission==='function'){
    // iOS: krever brukertrykk for kompass-tillatelse
    const ask=()=>{DeviceOrientationEvent.requestPermission().then(s=>{if(s==='granted')window.addEventListener('deviceorientation',headingHandler,true);}).catch(()=>{});};
    document.addEventListener('click',ask,{once:true});
    document.addEventListener('touchend',ask,{once:true});
  } else if('ondeviceorientationabsolute' in window){
    window.addEventListener('deviceorientationabsolute',headingHandler,true);
  } else {
    window.addEventListener('deviceorientation',headingHandler,true);
  }
}

redraw();
initHeading();
startGps();
ensureProgram();
setInterval(()=>{refreshProgram(false);},60000); // hvert minutt: rydd bort passerte poster, oppdater «om X min», hent nytt program ved datoskifte
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')refreshProgram(false);});
// Lukk gangavstandslisten når man trykker et annet sted på skjermen
document.addEventListener('click',ev=>{
  const p=document.getElementById('panel');
  if(!p.classList.contains('collapsed')&&!p.contains(ev.target))p.classList.add('collapsed');
},true);
