<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Dyreparken – familiekart</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dyreparken">
<meta name="theme-color" content="#2e7d32">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  html,body{margin:0;padding:0;height:100%;font-family:-apple-system,'Segoe UI',Roboto,sans-serif;}
  #map{position:absolute;top:0;bottom:0;left:0;right:0;}
  .topbar{position:absolute;top:calc(8px + env(safe-area-inset-top));left:8px;right:8px;z-index:1000;display:flex;gap:6px;flex-wrap:wrap;}
  .topbar button{border:none;border-radius:16px;padding:7px 12px;font-size:13px;font-weight:600;
    background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.3);cursor:pointer;color:#333;}
  .topbar button.active{background:#2e7d32;color:#fff;}
  .topbar button.warn{background:#ff9800;color:#fff;}
  #panel{position:absolute;bottom:0;left:0;right:0;z-index:1000;background:#fff;border-radius:16px 16px 0 0;
    box-shadow:0 -2px 10px rgba(0,0,0,.25);max-height:45%;display:flex;flex-direction:column;transition:max-height .25s;}
  #panel.collapsed{max-height:44px;}
  #panelHead{padding:10px 16px;font-weight:700;font-size:15px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
  #list{overflow-y:auto;padding:0 8px calc(12px + env(safe-area-inset-bottom));}
  .row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;}
  .row:active{background:#eef7ee;}
  .row .em{font-size:22px;width:28px;text-align:center;}
  .row .nm{flex:1;font-size:14px;font-weight:600;color:#222;}
  .row .nm small{display:block;font-weight:400;color:#777;font-size:11px;}
  .row .min{font-size:14px;font-weight:800;color:#2e7d32;white-space:nowrap;}
  .divlabel{padding:6px 12px 2px;font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.5px;}
  .emoji-marker{font-size:22px;text-shadow:0 1px 3px rgba(0,0,0,.4);text-align:center;line-height:26px;}
  .emoji-small{font-size:15px;opacity:.85;text-align:center;line-height:18px;}
  .me-dot{width:18px;height:18px;border-radius:50%;background:#1976d2;border:3px solid #fff;box-shadow:0 0 8px rgba(25,118,210,.9);position:absolute;left:10px;top:10px;}
  .me-wrap{position:relative;width:44px;height:44px;transform-origin:22px 22px;transition:transform .2s linear;}
  .me-wrap svg{position:absolute;left:0;top:0;display:none;}
  .leaflet-popup-content{font-size:14px;margin:10px 14px;}
  .leaflet-popup-content b{font-size:15px;}
  #hint{position:absolute;top:52px;left:8px;right:8px;z-index:1001;background:#fff8e1;border:1px solid #ffca28;
    border-radius:10px;padding:8px 12px;font-size:13px;display:none;}
</style>
</head>
<body>
<div id="map"></div>
<div class="topbar">
  <button id="btnGps" class="warn" onclick="startGps()">📍 Finn meg</button>
  <button class="active" data-cat="univers" onclick="toggleCat(this)">🎪 Universer</button>
  <button class="active" data-cat="dyr" onclick="toggleCat(this)">🦁 Dyr</button>
  <button data-cat="leke" onclick="toggleCat(this)">🛝 Lek</button>
  <button data-cat="wc" onclick="toggleCat(this)">🚻 WC</button>
  <button onclick="toggleProgram()">🎭 Program</button>
  <button id="btnClearRoute" style="display:none;background:#e91e63;color:#fff;" onclick="clearRoute()">✕ Fjern rute</button>
</div>
<div id="prog" style="display:none;position:absolute;top:0;bottom:0;left:0;right:0;z-index:1100;background:#fff;overflow-y:auto;padding-top:env(safe-area-inset-top);">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px 6px;">
    <b style="font-size:17px;">🎭 Dagens program</b>
    <button onclick="document.getElementById('prog').style.display='none'" style="border:none;background:#eee;border-radius:14px;padding:6px 12px;font-weight:700;cursor:pointer;">✕ Lukk</button>
  </div>
  <div id="progList"><div style="padding:14px;color:#777;">Laster …</div></div>
</div>
<div id="hint"></div>
<div id="panel" class="collapsed">
  <div id="panelHead" onclick="document.getElementById('panel').classList.toggle('collapsed')">
    <span>🚶 Gangtid herfra (4-åringstempo)</span><span id="panelArrow">▲</span>
  </div>
  <div id="list"><div style="padding:12px;color:#777;font-size:13px;">Venter på GPS-posisjon …</div></div>
</div>
<script>
// ---- Attraksjoner (ekte koordinater fra OpenStreetMap) ----
const P = [
 // Universer & hovedattraksjoner
 {n:"Hovedinngang",           la:58.18454, lo:8.14674, c:"univers", e:"🎟️", d:"Inngang øst / hovedinngang"},
 {n:"Inngang Syd",            la:58.18175, lo:8.14600, c:"univers", e:"🎟️", d:"Sørlig inngang"},
 {n:"Kardemomme by",          la:58.18734, lo:8.13997, c:"univers", e:"🏘️", d:"Politimester Bastian & Kamomilla. Perfekt for 4-åringer"},
 {n:"Kardemomme-karusellen",  la:58.18737, lo:8.13931, c:"univers", e:"🎠", d:"Karusell i Kardemomme by"},
 {n:"Hakkebakkeskogen (togreise)", la:58.18589, lo:8.14061, c:"univers", e:"🚂", d:"Reisen gjennom Hakkebakkeskogen – stor favoritt"},
 {n:"KuToppen",               la:58.18464, lo:8.14022, c:"univers", e:"🐄", d:"Bondegård med aktivitetshus – klappe dyr"},
 {n:"Kaptein Sabeltanns verden (Kjuttaviga)", la:58.18585, lo:8.14721, c:"univers", e:"🏴‍☠️", d:"Sjørøverteater, skattkammer, båter"},
 {n:"Abra Havn",              la:58.18835, lo:8.15130, c:"univers", e:"⚓", d:"Sjørøverlandsby med paradegate"},
 {n:"Badelandet",             la:58.18805, lo:8.14469, c:"univers", e:"🏊", d:"Innendørs badeland (egen billett)"},
 {n:"Minitoget",              la:58.18647, lo:8.14585, c:"univers", e:"🚃", d:"Lite tog – fin pause for små bein"},
 {n:"JungelBob (berg-og-dalbane)", la:58.18511, lo:8.14304, c:"univers", e:"🎢", d:"Barnevennlig berg-og-dalbane"},
 // Dyr
 {n:"Nordisk Villmark",       la:58.18638, lo:8.13680, c:"dyr", e:"🐺", d:"Ulv, elg, gaupe, jerv – gangsti gjennom skogen"},
 {n:"Elgen",                  la:58.18670, lo:8.13476, c:"dyr", e:"🫎", d:"I Nordisk Villmark"},
 {n:"Savannen",               la:58.18325, lo:8.14716, c:"dyr", e:"🦒", d:"Sjiraff, sebra, antiloper"},
 {n:"Løvene",                 la:58.18252, lo:8.14568, c:"dyr", e:"🦁", d:"Løveanlegget"},
 {n:"Tigerens rike",          la:58.18239, lo:8.14013, c:"dyr", e:"🐯", d:"Sibirsk tiger"},
 {n:"Orangutanghuset",        la:58.18166, lo:8.14088, c:"dyr", e:"🦧", d:"Orangutanger"},
 {n:"Sjimpansene",            la:58.18386, lo:8.14358, c:"dyr", e:"🐵", d:"Sjimpanseøya"},
 {n:"Ringhalelemurene",       la:58.18358, lo:8.14196, c:"dyr", e:"🐒", d:"Lemurer"},
 {n:"Manyatta – Barnas afrikanske landsby", la:58.18301, lo:8.14512, c:"dyr", e:"🐐", d:"Klappedyr – topp for 4-åringer"},
 {n:"Surikatene",             la:58.18244, lo:8.14678, c:"dyr", e:"🦫", d:"Surikater og ørkenrev"},
 {n:"Kamelene",               la:58.18807, lo:8.14000, c:"dyr", e:"🐫", d:"Ved Kardemomme by"},
 // Lekeplasser
 {n:"Klatrefjellet",          la:58.18337, lo:8.14419, c:"leke", e:"🛝", d:"Lekeplass midt i parken"},
 {n:"Dødningskallen",         la:58.18880, lo:8.14982, c:"leke", e:"💀", d:"Sjørøverlekeplass ved Abra Havn"},
 {n:"Ildprøveplassen",        la:58.18921, lo:8.15110, c:"leke", e:"🔥", d:"Lekeplass i Abra Havn"},
 // WC
 {n:"WC", la:58.18181, lo:8.14629, c:"wc", e:"🚻"}, {n:"WC", la:58.18229, lo:8.14021, c:"wc", e:"🚻"},
 {n:"WC", la:58.18288, lo:8.14371, c:"wc", e:"🚻"}, {n:"WC", la:58.18327, lo:8.14618, c:"wc", e:"🚻"},
 {n:"WC", la:58.18557, lo:8.14716, c:"wc", e:"🚻"}, {n:"WC", la:58.18570, lo:8.14332, c:"wc", e:"🚻"},
 {n:"WC", la:58.18628, lo:8.14502, c:"wc", e:"🚻"}, {n:"WC", la:58.18727, lo:8.13897, c:"wc", e:"🚻"},
 {n:"WC", la:58.18785, lo:8.14447, c:"wc", e:"🚻"}, {n:"WC", la:58.18403, lo:8.13943, c:"wc", e:"🚻"},
 {n:"WC (Abra Havn)", la:58.18836, lo:8.15144, c:"wc", e:"🚻"},
];

const SPEED_M_PER_MIN = 42;   // ~2,5 km/t – rolig 4-åringstempo
const PATH_FACTOR = 1.35;     // stier er ikke luftlinje

const map = L.map('map',{zoomControl:false}).setView([58.1855,8.1435],16);
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,
  attribution:'&copy; OpenStreetMap'}).addTo(map);

let me=null, meMarker=null, accCircle=null, watchId=null, hasCompass=false;
const markers=[];

function icon(e,small){return L.divIcon({html:e,className:small?'emoji-small':'emoji-marker',iconSize:small?[18,18]:[26,26],iconAnchor:small?[9,9]:[13,13]});}

P.forEach(p=>{
  const m=L.marker([p.la,p.lo],{icon:icon(p.e,p.c==='wc')});
  m.bindPopup('…'); m.p=p; markers.push(m);
});

function dist(a,b,c,d){const R=6371000,r=Math.PI/180;
  const x=(c-a)*r, y=(d-b)*r*Math.cos((a+c)/2*r);
  return R*Math.sqrt(x*x+y*y);}
function mins(p){if(!me)return null;
  return Math.max(1,Math.round(dist(me[0],me[1],p.la,p.lo)*PATH_FACTOR/SPEED_M_PER_MIN));}

function popupHtml(p){
  const t=mins(p);
  const idx=P.indexOf(p);
  return `<b>${p.e} ${p.n}</b><br>${p.d||''}${t?`<br><span style="color:#2e7d32;font-weight:800;">🚶 ca. ${t} min å gå</span>`:'<br><i>Sett posisjonen din for gangtid</i>'}<br><button style="margin-top:6px;border:none;border-radius:12px;padding:6px 12px;background:#e91e63;color:#fff;font-weight:700;font-size:13px;cursor:pointer;" onclick="route(${idx})">🧭 Vis raskeste vei</button>`;}

function activeCats(){return [...document.querySelectorAll('[data-cat].active')].map(b=>b.dataset.cat);}
function redraw(){
  const cats=activeCats();
  markers.forEach(m=>{
    if(cats.includes(m.p.c)){m.addTo(map);m.setPopupContent(popupHtml(m.p));}
    else map.removeLayer(m);});
  renderList();
}
function toggleCat(btn){btn.classList.toggle('active');redraw();}

function renderList(){
  const el=document.getElementById('list');
  if(!me){return;}
  const cats=activeCats();
  const items=P.filter(p=>cats.includes(p.c)&&p.c!=='wc').map(p=>({p,t:mins(p)})).sort((a,b)=>a.t-b.t);
  const wc=P.filter(p=>p.c==='wc').map(p=>({p,t:mins(p)})).sort((a,b)=>a.t-b.t)[0];
  let h='';
  if(wc) h+=`<div class="row" onclick="fly(${wc.p.la},${wc.p.lo})"><div class="em">🚻</div><div class="nm">Nærmeste toalett</div><div class="min">${wc.t} min</div></div><div class="divlabel">Attraksjoner – nærmest først</div>`;
  h+=items.map(i=>`<div class="row" onclick="fly(${i.p.la},${i.p.lo})"><div class="em">${i.p.e}</div><div class="nm">${i.p.n}<small>${i.p.d||''}</small></div><div class="min">${i.t} min</div></div>`).join('');
  el.innerHTML=h;
}
function fly(la,lo){map.flyTo([la,lo],17.5);const m=markers.find(m=>m.p.la===la&&m.p.lo===lo);if(m)m.openPopup();}

function setMe(la,lo,acc){
  const first=!meMarker;
  me=[la,lo];
  if(!meMarker){
    const html='<div class="me-wrap" id="meWrap"><svg width="44" height="44" viewBox="0 0 44 44"><path d="M22 22 L11 5 A21 21 0 0 1 33 5 Z" fill="rgba(25,118,210,.35)"/></svg><div class="me-dot"></div></div>';
    meMarker=L.marker(me,{icon:L.divIcon({html:html,className:'',iconSize:[44,44],iconAnchor:[22,22]}),zIndexOffset:1000}).addTo(map).bindPopup('<b>Du er her</b>');
    meMarker.on('click',()=>{map.flyTo(me,Math.max(map.getZoom(),17));});
    accCircle=L.circle(me,{radius:acc||20,color:'#1976d2',weight:1,fillOpacity:.08}).addTo(map);
  } else {meMarker.setLatLng(me);accCircle.setLatLng(me);if(acc)accCircle.setRadius(acc);}
  if(first){map.flyTo(me,17);document.getElementById('panel').classList.remove('collapsed');}
  redraw();
}

// ---- Rute (raskeste vei langs stiene, OSRM foot) ----
let routeLine=null;
function clearRoute(){
  if(routeLine){map.removeLayer(routeLine);routeLine=null;}
  document.getElementById('btnClearRoute').style.display='none';
}
async function route(idx){const p=P[idx];return routeTo(p.la,p.lo,p.n);}
async function routeTo(la,lo,name){
  if(!me){hint('Sett posisjonen din først – trykk «📍 Finn meg» eller «👆 Sett posisjon».',6000);return;}
  hint('Finner raskeste vei …',3000);
  map.closePopup();
  try{
    const r=await fetch(`https://routing.openstreetmap.de/routed-foot/route/v1/foot/${me[1]},${me[0]};${lo},${la}?overview=full&geometries=geojson`);
    const j=await r.json();
    if(j.code!=='Ok'||!j.routes||!j.routes[0])throw new Error('no route');
    const coords=j.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
    if(routeLine)map.removeLayer(routeLine);
    routeLine=L.polyline(coords,{color:'#e91e63',weight:5,opacity:.9}).addTo(map);
    const d=j.routes[0].distance;
    const t=Math.max(1,Math.round(d/SPEED_M_PER_MIN));
    map.fitBounds(routeLine.getBounds(),{padding:[70,70]});
    hint(`🧭 Til ${name}: ca. ${t} min å gå (${Math.round(d)} m) i barnetempo`,10000);
  }catch(e){
    if(routeLine)map.removeLayer(routeLine);
    routeLine=L.polyline([me,[la,lo]],{color:'#e91e63',weight:4,dashArray:'6 8',opacity:.8}).addTo(map);
    map.fitBounds(routeLine.getBounds(),{padding:[70,70]});
    const est=Math.max(1,Math.round(dist(me[0],me[1],la,lo)*PATH_FACTOR/SPEED_M_PER_MIN));
    hint(`Fant ikke sti-rute akkurat nå – viser retningen (luftlinje) til ${name}. Ca. ${est} min.`,8000);
  }
  document.getElementById('btnClearRoute').style.display='inline-block';
}

// ---- Dagens program (oppdateres automatisk fra dyreparken.no via GitHub Action) ----
let progData=null, progLoaded=false;
const VENUES={'KuToppen':[58.18464,8.14022],'Kaptein Sabeltanns Verden':[58.18585,8.14721],'Hakkebakkeskogen':[58.18589,8.14061],'Kardemomme by':[58.18734,8.13997],'Nordisk Villmark':[58.18638,8.13680],'Afrika':[58.18325,8.14716],'Jungelen':[58.18511,8.14304],'Abra Havn':[58.18835,8.15130],'Badelandet':[58.18805,8.14469]};
function venueCoords(e){
  if(VENUES[e.venue])return VENUES[e.venue];
  const t=(e.title||'').toLowerCase();
  for(const k of Object.keys(VENUES)){if(t.includes(k.toLowerCase()))return VENUES[k];}
  if(/sabeltann|sjørøver|pinky|langemann/.test(t))return VENUES['Kaptein Sabeltanns Verden'];
  if(/kardemomme|tobias|bastian|kamomilla|trikke/.test(t))return VENUES['Kardemomme by'];
  if(/hakkebakke|klatremus|bakermester|morten skogmus/.test(t))return VENUES['Hakkebakkeskogen'];
  if(/kutoppen|klara|gårds/.test(t))return VENUES['KuToppen'];
  if(/savanne|sjiraff|afrika/.test(t))return VENUES['Afrika'];
  return null;
}
async function toggleProgram(){
  const el=document.getElementById('prog');
  if(el.style.display==='block'){el.style.display='none';return;}
  el.style.display='block';
  if(!progLoaded){
    try{const r=await fetch('program.json?t='+Date.now(),{cache:'no-store'});progData=await r.json();}catch(e){progData=null;}
    progLoaded=true;
  }
  renderProgram();
}
function renderProgram(){
  const el=document.getElementById('progList');
  const today=new Date().toLocaleDateString('sv-SE');
  if(!progData||!progData.entries||!progData.entries.length){
    el.innerHTML='<div style="padding:14px;font-size:14px;color:#555;">Programmet er ikke lastet ennå. Se <a href="https://www.dyreparken.no/dagsprogram/" target="_blank">dagsprogrammet på dyreparken.no</a>.</div>';
    return;
  }
  let h='';
  if(progData.date!==today)h+=`<div style="margin:8px 14px;padding:8px 12px;background:#fff8e1;border:1px solid #ffca28;border-radius:10px;font-size:13px;">⚠️ Programmet er fra ${progData.date} og kan avvike i dag. <a href="https://www.dyreparken.no/dagsprogram/" target="_blank">Sjekk dyreparken.no</a></div>`;
  const nowHM=new Date().toTimeString().slice(0,5);
  const seen=new Set();
  const uniq=progData.entries.filter(e=>{const k=e.title+'|'+e.venue+'|'+e.times.map(t=>t.from).join(',');if(seen.has(k))return false;seen.add(k);return true;});
  const list=uniq.map(e=>({...e,next:e.times.find(t=>t.to>=nowHM)||null}));
  list.sort((a,b)=>{const ka=a.next?a.next.from:'99:99',kb=b.next?b.next.from:'99:99';return ka<kb?-1:ka>kb?1:0;});
  h+=list.map(e=>{
    const c=venueCoords(e);
    const times=e.times.map(t=>`<span style="${e.next&&t.from===e.next.from?'font-weight:800;color:#2e7d32;':'color:#999;'}">${t.from}</span>`).join(' · ');
    const em=e.category==='Dyrepresentasjoner'?'🦁':e.category==='Kveldsforestillinger'?'🌟':'🎭';
    return `<div class="row" style="${e.next?'':'opacity:.45;'}" ${c?`onclick="progGo(${c[0]},${c[1]},false)"`:''}>
      <div class="em">${em}</div>
      <div class="nm">${e.title}${e.ticket?' 🎟️':''}<small>${e.venue||''} · ${times}${e.ticket?' · egen billett':''}</small></div>
      ${c?`<button style="border:none;background:#e91e63;color:#fff;border-radius:12px;padding:6px 10px;font-weight:700;cursor:pointer;" onclick="event.stopPropagation();progGo(${c[0]},${c[1]},true)">🧭</button>`:''}
    </div>`;}).join('');
  h+=`<div style="padding:10px 14px 24px;font-size:12px;color:#888;">Hentes automatisk fra dyreparken.no hver morgen · <a href="https://www.dyreparken.no/dagsprogram/" target="_blank">offisielt dagsprogram</a></div>`;
  el.innerHTML=h;
}
function progGo(la,lo,withRoute){
  document.getElementById('prog').style.display='none';
  if(withRoute)routeTo(la,lo,'forestillingen');
  else map.flyTo([la,lo],17.5);
}

function hint(t,ms){const h=document.getElementById('hint');h.textContent=t;h.style.display='block';if(ms)setTimeout(()=>h.style.display='none',ms);}

function startGps(){
  if(watchId&&me){map.flyTo(me,Math.max(map.getZoom(),17));return;}
  if(!navigator.geolocation){hint('GPS ikke tilgjengelig – bruk «👆 Sett posisjon».');return;}
  hint('Henter GPS-posisjon …',4000);
  if(watchId)navigator.geolocation.clearWatch(watchId);
  watchId=navigator.geolocation.watchPosition(
    pos=>{document.getElementById('btnGps').classList.remove('warn');
          document.getElementById('btnGps').classList.add('active');
          document.getElementById('btnGps').textContent='📍 GPS på';
          setMe(pos.coords.latitude,pos.coords.longitude,pos.coords.accuracy);
          if(!hasCompass&&pos.coords.heading!=null&&!isNaN(pos.coords.heading)&&(pos.coords.speed||0)>0.5)applyHeading(pos.coords.heading);},
    err=>{hint('Fikk ikke GPS-posisjon. Sjekk at nettleseren har lov til å bruke stedstjenester (Innstillinger → Safari/Chrome → Posisjon), og prøv «📍 Finn meg» igjen.');},
    {enableHighAccuracy:true,maximumAge:5000,timeout:15000});
}

// ---- Kompass / retning ----
function applyHeading(h){
  const w=document.getElementById('meWrap');
  if(!w)return;
  w.style.transform='rotate('+h+'deg)';
  w.querySelector('svg').style.display='block';
}
function headingHandler(e){
  let h=null;
  if(typeof e.webkitCompassHeading==='number'&&!isNaN(e.webkitCompassHeading))h=e.webkitCompassHeading;
  else if(e.absolute&&typeof e.alpha==='number')h=(360-e.alpha)%360;
  if(h!=null){hasCompass=true;applyHeading(h);}
}
function initHeading(){
  if(window.DeviceOrientationEvent&&typeof DeviceOrientationEvent.requestPermission==='function'){
    // iOS: krever brukertrykk for kompass-tillatelse
    const ask=()=>{DeviceOrientationEvent.requestPermission().then(s=>{if(s==='granted')window.addEventListener('deviceorientation',headingHandler,true);}).catch(()=>{});};
    document.addEventListener('click',ask,{once:true});
    document.addEventListener('touchend',ask,{once:true});
  } else if('ondeviceorientationabsolute' in window){
    window.addEventListener('deviceorientationabsolute',headingHandler,true);
  } else {
    window.addEventListener('deviceorientation',headingHandler,true);
  }
}

redraw();
initHeading();
startGps();
</script>
